name: crypto-batch-elt

services:
  kestra:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crypto-elt-kestra:local
    user: root
    env_file:
      - ../.env
    working_dir: /opt/project
    environment:
      KESTRA_CONFIGURATION: |
        micronaut:
          server:
            port: 8080
        kestra:
          server:
            basic-auth:
              username: admin@kestra.io
              password: Admin1234
          url: http://localhost:8080/
    ports:
      - "8080:8080"
    volumes:
      - ../data/warehouse:/opt/project/data/warehouse
      - kestra-data:/app/storage

  kestra-bootstrap:
    image: curlimages/curl:8.12.1
    depends_on:
      - kestra
    restart: "no"
    environment:
      KESTRA_USERNAME: admin@kestra.io
      KESTRA_PASSWORD: Admin1234
    command:
      - sh
      - -c
      - |
        echo "Waiting for Kestra to accept execution requests...";
        for i in $(seq 1 60); do
          if curl -sf -u "$$KESTRA_USERNAME:$$KESTRA_PASSWORD" -X POST "http://kestra:8080/api/v1/main/executions/demo.crypto/crypto_batch_elt?wait=true" > /tmp/bootstrap-response.json; then
            echo "Initial flow execution completed.";
            cat /tmp/bootstrap-response.json;
            exit 0;
          fi;
          sleep 5;
        done;
        echo "Kestra flow did not become ready in time." >&2;
        exit 1

volumes:
  kestra-data:
